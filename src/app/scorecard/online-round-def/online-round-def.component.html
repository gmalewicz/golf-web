@if (!displaySgn()) {
  <div class="d-flex justify-content-center">
    <span class="spinner-border text-success" style="width: 3rem; height: 3rem;"></span>
  </div>
}
@if (displaySgn()) {
  <div>
    <div>
      <h2>
        {{courseSgn().name}}
      </h2>
    </div>
    <ul class="nav nav-tabs" id="myTab" data-html2canvas-ignore="true">
      <li class="nav-item">
        <button class="nav-link active" id="sp-tab" data-bs-toggle="tab" data-bs-target="#sp" type="button"
          role="tab" aria-controls="sp-tab" aria-selected="true" (click)="changeFormat(Format.STROKE_PLAY)">Stroke Play</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="mp-tab" data-bs-toggle="tab" data-bs-target="#mp" type="button"
          role="tab" aria-controls="mp-tab" aria-selected="false" (click)="changeFormat(Format.MATCH_PLAY)">Match Play</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="fbsp-tab" data-bs-toggle="tab" data-bs-target="#fbsp" type="button"
          role="tab" aria-controls="fbsp-tab" aria-selected="false" (click)="changeFormat(Format.FOUR_BALL_STROKE_PLAY)">Four Ball SP</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="fbmp-tab" data-bs-toggle="tab" data-bs-target="#fbmp" type="button"
          role="tab" aria-controls="fbmp-tab" aria-selected="false" (click)="changeFormat(Format.FOUR_BALL_MATCH_PLAY)">Four Ball MP</button>
      </li>
    </ul>
    <app-player-selector [courseSgn]='courseSgn()' [formatSgn]='formatSgn()'></app-player-selector>
      
    </div>
  }
