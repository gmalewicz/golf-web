<div [loading]="!display" loadingSize="lg" loadingColor="text-success" style="min-height: 4rem">
    <div>
      <canvas baseChart [datasets]="barChartData" [labels]="barChartLabels" [options]="barChartOptions" [legend]="true" [type]="barChartType">
      </canvas>
    </div>
    <div>
      @defer {
      @if (displayTees) {
        <app-course-tees></app-course-tees>
      }
      @if (displayAddTee){
        <app-add-tee></app-add-tee>
      }
    }
  </div>
  <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 8px;">
    <button type="button" class="btn btn-success golf-margin-bottom-6 golf-width-120" routerLink="/home" i18n="@@course-cancel">
      Cancel
    </button>
    <button type="button" [loading]="loadingTees" [disabled]="loadingTees" class="btn btn-success btn-showTees golf-margin-bottom-6 golf-width-120" (click)="onShowTees()">
      {{showTeesLbl}}
    </button>
    <button type="button" [disabled]="displayAddTee" class="btn btn-success btn-addTee golf-margin-bottom-6 golf-width-120" (click)="addTee()">
      <span i18n="@@course-addTee">Add tee</span>
    </button>
    <button type="button" *can="'ADMIN'" [loading]="loadingDelete" [disabled]="loadingDelete" class="btn btn-success btn-delete golf-margin-bottom-6 golf-width-120" (click)="deleteCourse()">
      <span i18n="@@course-delete">Delete</span>
    </button>
    <button type="button" *can="'ADMIN'" [loading]="loadingClone" [disabled]="loadingClone" class="btn btn-success btn-clone golf-margin-bottom-6 golf-width-120" (click)="clone()">
      <span i18n="@@course-clone">Clone</span>
    </button>
  </div>
</div>
