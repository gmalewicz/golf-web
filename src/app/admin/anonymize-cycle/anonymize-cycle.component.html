<form [formGroup]="anonymizeCycleForm" (ngSubmit)="onSubmitAnonymize()">
  <div class="form-group">
    <label for="cycleId">Cycle id</label>
    <input
      type="text"
      formControlName="cycleId"
      class="form-control"
      [ngClass]="{ 'is-invalid': submittedAnonymizeCycle && fAnonymize.cycleId.errors }"
      />
      @if (submittedAnonymizeCycle && fAnonymize.cycleId.errors) {
        <div
          class="invalid-feedback"
          >
          @if (fAnonymize.cycleId.errors.required) {
            <div>Cycle id is required</div>
          }
          @if (fAnonymize.cycleId.errors.pattern) {
            <div>
              Cycle id can be up to 10 digits long and can not start from 0
            </div>
          }
        </div>
      }
    </div>
    <div class="form-group golf-margin-top">
      <button [disabled]="anonymizeLoading" class="btn btn-success">
        @if (anonymizeLoading) {
          <span
            class="spinner-border spinner-border-sm mr-1"
          ></span>
        }
        Anonymize
      </button>
      <a routerLink="/home" class="btn btn-link text-success">Cancel</a>
    </div>
  </form>
